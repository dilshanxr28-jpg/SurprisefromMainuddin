<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>The Journey | Surprise</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            font-family: 'Cinzel', serif; 
            transition: background 1.5s ease; 
            min-height: 100vh; 
            background-color: #FCE4EC; 
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            overflow-x: hidden;
            color: #4a0404;
        }
        
        .theme-active { background: linear-gradient(135deg, #001f3f 0%, #660000 100%) !important; color: #FFD700 !important; }

        .glass-box {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 15px;
            width: 92%;
            max-width: 500px;
            padding: 1.5rem;
            margin: 20px auto;
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
            z-index: 10;
        }

        .particle {
            position: fixed;
            pointer-events: none;
            z-index: 999;
            animation: flyUp 3s linear forwards;
        }
        @keyframes flyUp {
            0% { transform: translateY(0) rotate(0deg); opacity: 1; }
            100% { transform: translateY(-100vh) rotate(360deg); opacity: 0; }
        }

        .btn-official {
            padding: 14px 10px;
            border-radius: 8px;
            text-transform: uppercase;
            transition: 0.3s;
            cursor: pointer;
            letter-spacing: 1px;
            font-size: 0.7rem;
            width: 100%;
            margin-top: 10px;
            border: 1px solid currentColor;
            background: transparent;
        }
        
        .hidden-stage { display: none; }
        .fade-in { animation: fadeIn 1s ease-in forwards; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* --- CSS CAKE LAYER ANIMATIONS --- */
        .cake-container { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 260px; position: relative; cursor: pointer; }
        .cake { position: relative; width: 180px; height: 100px; background: #f194b4; border-radius: 50px / 25px; box-shadow: 0 8px 0 #e06c96, 0 15px 20px rgba(0,0,0,0.3); }
        .cake::before { content: ""; position: absolute; top: -15px; left: 0; width: 180px; height: 40px; background: #fff1f5; border-radius: 50px / 20px; z-index: 2; }
        .cream-drip { position: absolute; top: 12px; left: 15px; width: 150px; height: 25px; background: #fff1f5; border-radius: 0 0 10px 10px; z-index: 2; display: flex; justify-content: space-around; }
        .drip { width: 15px; height: 18px; background: #fff1f5; border-radius: 0 0 50% 50%; }
        
        .candle-wrapper { position: absolute; top: -35px; width: 100%; display: flex; justify-content: center; gap: 25px; z-index: 4; }
        .candle { width: 10px; height: 45px; background: linear-gradient(to right, #ffe066, #f5b041); border-radius: 4px; position: relative; }
        .flame { position: absolute; top: -15px; left: 50%; transform: translateX(-50%); width: 10px; height: 16px; background: #ff7675; border-radius: 50% 50% 20% 20%; box-shadow: 0 0 10px #ff7675, 0 0 20px #ffbe76; animation: flicker 0.6s infinite alternate; }
        .flame.off { display: none !important; }
        @keyframes flicker { 0% { transform: translateX(-50%) scale(1); } 100% { transform: translateX(-50%) scale(1.15) rotate(2deg); } }

        /* Top-Down Cake View */
        .top-cake-view { width: 220px; height: 220px; background: #f194b4; border-radius: 50%; position: relative; border: 8px solid #fff1f5; box-shadow: inset 0 0 20px rgba(0,0,0,0.15), 0 10px 25px rgba(0,0,0,0.4); overflow: hidden; touch-action: none; cursor: crosshair; }
        .sprinkles { position: absolute; width: 8px; height: 8px; background: #fff; border-radius: 50%; }
        
        .cut-line { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; stroke: #ffffd7; stroke-width: 4; stroke-dasharray: 6; }

        /* Fixed & Verified Slider Styles */
        .photo-slider { display: flex; overflow-x: auto; scroll-snap-type: x mandatory; scroll-behavior: smooth; -webkit-overflow-scrolling: touch; width: 100%; height: 100%; }
        .photo-slider::-webkit-scrollbar { display: none; }
        .slide-item { flex: 0 0 100%; width: 100%; height: 100%; scroll-snap-align: start; display: flex; justify-content: center; align-items: center; padding: 10px; }
        .slide-item img { max-width: 100%; max-height: 100%; object-fit: contain; border-radius: 8px; }
    </style>
</head>
<body id="main-body">

    <!-- INITIAL ENTRY LAYER FOR AUDIO UNLOCK (Solves Browser Blocking Rules) -->
    <div id="gesture-layer" class="fixed inset-0 z-[1000] bg-pink-100 flex flex-col items-center justify-center p-6 text-center">
        <div class="glass-box bg-white/80">
            <h2 class="mb-6 text-sm tracking-widest uppercase font-bold">Welcome to the Journey</h2>
            <p class="text-xs text-gray-600 mb-4 font-sans">Click below to enable the interactive music background sound elements.</p>
            <button class="btn-official bg-pink-600 text-white font-bold" onclick="unlockAudio()">Enter Experience</button>
        </div>
    </div>

    <!-- Audio Element -->
    <audio id="surprise-music" preload="auto" loop>
        <!-- Using a reliable open-source background music link as a test fallback -->
        <source id="audio-source" src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
    </audio>

    <div class="w-full flex flex-col items-center py-6">
        
        <!-- INITIAL STAGE: OPEN BUTTON CONTAINER -->
        <div id="section-gate" class="glass-box fade-in">
            <h2 class="text-center text-xs mb-6 uppercase tracking-widest">A Special Invitation</h2>
            <button id="btn-reveal" class="btn-official bg-red-700 text-white" onclick="startCakeSequence()">Reveal the Surprise</button>
        </div>

        <!-- ANIMATION INTERLUDE 1: BLOWING CANDLES -->
        <div id="stage-candles" class="hidden-stage glass-box text-center fade-in">
            <p class="text-xs uppercase tracking-widest mb-4 text-yellow-400 font-bold">Tap the Cake 3 times to blow out the candles! 🎂</p>
            <div class="cake-container" onclick="blowCandle()">
                <div class="cake">
                    <div class="candle-wrapper">
                        <div class="candle"><div id="flame1" class="flame"></div></div>
                        <div class="candle"><div id="flame2" class="flame"></div></div>
                        <div class="candle"><div id="flame3" class="flame"></div></div>
                    </div>
                    <div class="cream-drip">
                        <div class="drip"></div><div class="drip"></div><div class="drip"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- ANIMATION INTERLUDE 2: SWIPE TO CUT CAKE -->
        <div id="stage-cut" class="hidden-stage glass-box text-center fade-in">
            <p class="text-xs uppercase tracking-widest mb-6 text-yellow-400 font-bold">Drag or Swipe directly across the cake to cut your slice! 🔪</p>
            <div class="flex justify-center items-center w-full py-4">
                <div id="cake-topview" class="top-cake-view">
                    <div class="sprinkles" style="top:40px; left:50px; background:#ffd700;"></div>
                    <div class="sprinkles" style="top:60px; left:140px; background:#ff4081;"></div>
                    <div class="sprinkles" style="top:130px; left:60px; background:#00e5ff;"></div>
                    <div class="sprinkles" style="top:120px; left:130px; background:#e040fb;"></div>
                    <div class="sprinkles" style="top:95px; left:95px; background:#ffffff; width:16px; height:16px; text-align:center; line-height:16px; font-size:12px;">❤️</div>
                    
                    <svg class="cut-line"><line id="svg-line" x1="0" y1="0" x2="0" y2="0" style="display:none;" /></svg>
                </div>
            </div>
        </div>

        <!-- THE MAIN SURPRISE CONTENT -->
        <div id="section-content" class="hidden-stage glass-box fade-in">
            <div id="message-container" class="text-[11px] space-y-6 leading-relaxed"></div>
            
            <button id="btn-memories" class="btn-official bg-amber-600 border-none text-white mt-6 font-bold" onclick="openGallery()">📷 Memories</button>
            <button id="btn-stop-music" class="btn-official border-yellow-500 text-yellow-500 mt-2" onclick="stopMusic()">Mute Music</button>

            <!-- DIRECT INSTAGRAM REPLY BUTTON CONTAINER -->
            <div id="reply-area" class="hidden-stage mt-2 w-full">
                <a id="reply-link" href="" target="_blank" class="block w-full">
                    <button class="btn-official bg-yellow-500 text-black font-bold border-none hover:bg-yellow-400">Reply</button>
                </a>
            </div>
        </div>
    </div>

    <!-- FULL SCREEN MEMORIES LIGHTBOX/GALLERY OVERLAY -->
    <div id="gallery-overlay" class="fixed inset-0 bg-black/95 z-[2000] hidden-stage flex flex-col items-center justify-center fade-in">
        <button class="absolute top-6 right-6 text-white text-4xl font-light focus:outline-none z-[2010]" onclick="closeGallery()">&times;</button>
        <div class="w-full max-w-md h-[60vh] flex flex-col justify-center relative px-4">
            <div id="slider-engine" class="photo-slider rounded-xl items-center bg-neutral-900/50">
                <!-- Images are generated here dynamically -->
            </div>
            <p class="text-center text-[10px] text-gray-400 uppercase tracking-widest mt-6">← Swipe left or right to browse memories →</p>
        </div>
    </div>

    <script>
        // CONFIGURATION STAGE
        const INSTAGRAM_PROFILE_URL = "https://www.instagram.com/mainuddin_abbunavar__07?igsh=MWZ0bHZub3JubGZy";
        
        // Custom Music: Swap the URL string inside the quotes with your local filename like "phase2music.mp3"
        const MUSIC_FILE_URL = "phase2music.mp3"; 

        // Live test placeholder images from Unsplash so you can test scrolling immediately!
        // Swap these URLs with your own image links when ready!
        const PHOTOS = [
            "photo1.jpg",
            "photo2.jpg",
            "photo3.jpg",
            "photo4.jpg",
            "photo5.jpg"
        ];

        const SURPRISE_MESSAGE = `
            <div class="text-center mb-6">
                <h1 class="font-bold text-lg inline-block uppercase tracking-tighter">Happy Birthday to My Hitleres’s 💖🎂</h1>
                <sup class="text-[9px] text-pink-400 font-bold tracking-widest ml-1 block mt-1">TO My Bestie</sup>
            </div>
            <div class="space-y-4 text-justify">
                <p>I don’t know how to explain how special you are to me, but I’m really thankful to have you in my life. You’ve always supported me, made me smile in bad times, and created so many beautiful memories with me. Today is your day, and you deserve all the happiness, love, success, and care in the world.</p>
                <p>No matter what happens, I’ll always wish the best for you because your smile truly matters to me. Thank you for being such an amazing person and the best friend anyone could ask for. Enjoy your special day and keep shining forever ✨🤍</p>
            </div>
            <hr class="border-t border-white/20 my-6">
            <div class="space-y-4 text-justify">
                <p class="font-bold text-sm text-center text-yellow-400">Dear Bestie 💖</p>
                <p>From all the people I met, you became one of the most important ones in my life. Thank you for understanding me, supporting me, and standing by me in every mood and situation. Your presence brings peace and happiness into my life, and I truly value our friendship more than words can explain.</p>
                <p>On your birthday, I just want you to know that you deserve all the happiness in the world. May your smile never fade, may your dreams come true, and may this year bring beautiful moments into your life. No matter how much we fight, laugh, or annoy each other, you’ll always be special to me.</p>
                <p class="font-bold text-center text-xs mt-4">Happy Birthday once again 🎂✨ Stay happy, stay blessed, and keep shining forever 🤍</p>
            </div>
        `;

        const musicElement = document.getElementById('surprise-music');
        let blownFlamesCount = 0;

        function unlockAudio() {
            // Update audio component to your file choice
            if(MUSIC_FILE_URL && MUSIC_FILE_URL !== "") {
                document.getElementById('audio-source').src = MUSIC_FILE_URL;
                musicElement.load();
            }
            
            // Prime audio device profile engine
            musicElement.play().then(() => { 
                musicElement.pause(); 
                musicElement.currentTime = 0; 
            }).catch(e => console.log("Audio device initialization skipped:", e));
            
            document.getElementById('gesture-layer').style.display = 'none';
        }

        function spawnEmojis(emojiSet) {
            for(let i = 0; i < 25; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                p.innerText = emojiSet[Math.floor(Math.random() * emojiSet.length)];
                p.style.left = Math.random() * 100 + 'vw';
                p.style.bottom = '-10vh';
                p.style.fontSize = (Math.random() * 30 + 15) + 'px';
                p.style.animationDelay = (Math.random() * 1.5) + 's';
                document.body.appendChild(p);
                setTimeout(() => p.remove(), 3500);
            }
        }

        function startCakeSequence() {
            document.getElementById('main-body').className = 'theme-active';
            musicElement.play().catch(err => {
                console.log("Autoplay caught fallback activation used:", err);
                // Fallback secondary attempt if first unlock had an error
                musicElement.src = "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3";
                musicElement.play();
            });
            document.getElementById('section-gate').style.display = 'none';
            document.getElementById('stage-candles').style.display = 'block';
        }

        function blowCandle() {
            blownFlamesCount++;
            if(blownFlamesCount <= 3) {
                document.getElementById(`flame${blownFlamesCount}`).classList.add('off');
            }
            if(blownFlamesCount === 3) {
                setTimeout(() => {
                    document.getElementById('stage-candles').style.display = 'none';
                    initSwipeCuttingView();
                }, 800);
            }
        }

        function initSwipeCuttingView() {
            document.getElementById('stage-cut').style.display = 'block';
            const topViewElement = document.getElementById('cake-topview');
            const svgLine = document.getElementById('svg-line');
            
            let isDrawing = false;

            const startCut = (e) => {
                isDrawing = true;
                const bounds = topViewElement.getBoundingClientRect();
                const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                const clientY = e.touches ? e.touches[0].clientY : e.clientY;
                const startX = clientX - bounds.left;
                const startY = clientY - bounds.top;
                svgLine.setAttribute('x1', startX);
                svgLine.setAttribute('y1', startY);
                svgLine.setAttribute('x2', startX);
                svgLine.setAttribute('y2', startY);
                svgLine.style.display = 'block';
            };

            const moveCut = (e) => {
                if (!isDrawing) return;
                const bounds = topViewElement.getBoundingClientRect();
                const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                const clientY = e.touches ? e.touches[0].clientY : e.clientY;
                const currentX = clientX - bounds.left;
                const currentY = clientY - bounds.top;
                svgLine.setAttribute('x2', currentX);
                svgLine.setAttribute('y2', currentY);
            };

            const endCut = () => {
                if (!isDrawing) return;
                isDrawing = false;
                spawnEmojis(['✨', '🎉', '🍰', '❤️']);
                setTimeout(triggerFinalReveal, 600);
            };

            topViewElement.addEventListener('mousedown', startCut);
            topViewElement.addEventListener('mousemove', moveCut);
            window.addEventListener('mouseup', endCut);

            topViewElement.addEventListener('touchstart', startCut, {passive: true});
            topViewElement.addEventListener('touchmove', moveCut, {passive: true});
            window.addEventListener('touchend', endCut);
        }

        function triggerFinalReveal() {
            // Clean up windows
            document.getElementById('stage-cut').style.display = 'none';
            window.removeEventListener('mouseup', () => {}); 
            
            document.getElementById('message-container').innerHTML = SURPRISE_MESSAGE;
            document.getElementById('reply-link').href = INSTAGRAM_PROFILE_URL;
            
            document.getElementById('section-content').style.display = 'block';
            document.getElementById('reply-area').style.display = 'block';
            
            // Build the slider layout
            buildSliderContent();
        }

        function buildSliderContent() {
            const engine = document.getElementById('slider-engine');
            engine.innerHTML = "";
            
            PHOTOS.forEach(url => {
                const item = document.createElement('div');
                item.className = "slide-item";
                
                const img = document.createElement('img');
                img.src = url;
                img.alt = "Memory Image";
                img.onerror = function() {
                    // Fallback visual text block if local image asset path breaks
                    this.style.display = 'none';
                    const errTxt = document.createElement('p');
                    errTxt.className = "text-center text-xs text-neutral-400 px-4";
                    errTxt.innerText = "[Missing Image: Check file name/path]";
                    item.appendChild(errTxt);
                };
                
                item.appendChild(img);
                engine.appendChild(item);
            });
        }

        function openGallery() {
            document.getElementById('gallery-overlay').style.display = 'flex';
            document.body.style.overflow = 'hidden'; 
        }

        function closeGallery() {
            document.getElementById('gallery-overlay').style.display = 'none';
            document.body.style.overflow = 'auto'; 
        }

        function stopMusic() {
            musicElement.pause();
            document.getElementById('btn-stop-music').style.display = 'none';
        }
    </script>
</body>
</html>
